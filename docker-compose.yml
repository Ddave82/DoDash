version: '3.8'
services:
  client:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_API_URL=http://server:3001/api
      - WDS_SOCKET_PORT=0
    depends_on:
      - server

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - ./server/data.json:/app/data.json
    environment:
      - NODE_ENV=development

networks:
  default:
    driver: bridge
